<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LuniExpress ERP</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--p:#185FA5;--pl:#E6F1FB;--pt:#0C447C;--bg:#F4F6F9;--sf:#fff;--bd:#e2e8f0;--tx:#1a202c;--mu:#64748b;--ok:#16a34a;--er:#dc2626;--wa:#d97706;--r:8px;--rl:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px}
button{cursor:pointer;font-family:inherit;font-size:14px}
.app{display:flex;min-height:100vh}
.sb{width:220px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:width .2s;overflow-y:auto}
.sb.c{width:56px}
.sb-br{padding:13px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;min-height:54px;flex-shrink:0}
.bm{width:30px;height:30px;border-radius:7px;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.bn,.nl{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;transition:opacity .2s}
.sb.c .bn,.sb.c .nl,.sb.c .ns{opacity:0;width:0;overflow:hidden}
.nm{padding:5px 0;flex:1}
.ni{display:flex;align-items:center;gap:8px;padding:7px 11px;margin:1px 5px;border-radius:var(--r);color:var(--mu);font-size:13px;transition:all .15s;cursor:pointer;white-space:nowrap;user-select:none}
.ni:hover{background:#f1f5f9;color:var(--tx)}.ni.ac{background:var(--pl);color:var(--pt);font-weight:500}
.ni svg{flex-shrink:0;width:16px;height:16px}
.ns{padding:6px 11px 3px;font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.mn{margin-left:220px;flex:1;display:flex;flex-direction:column;transition:margin-left .2s}
.mn.c{margin-left:56px}
.hd{background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50}
.hc{height:74px;background:linear-gradient(135deg,var(--p) 0%,#378ADD 100%);position:relative;overflow:hidden}
.hlw{position:absolute;bottom:-17px;left:15px;z-index:2}
.hl{width:46px;height:46px;border-radius:10px;background:var(--sf);border:3px solid var(--sf);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:19px;color:var(--p);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.hl img{width:100%;height:100%;object-fit:cover}
.ha{position:absolute;top:7px;right:10px;display:flex;gap:6px;align-items:center}
.hp{background:rgba(255,255,255,.87);border-radius:6px;padding:4px 9px;font-size:12px;display:flex;align-items:center;gap:4px;color:#1a202c}
.ib{width:29px;height:29px;border-radius:6px;background:rgba(255,255,255,.87);border:none;display:flex;align-items:center;justify-content:center;color:#1a202c}
.hb{height:40px;display:flex;align-items:center;padding-left:73px;padding-right:14px;border-top:1px solid var(--bd)}
.hb h1{font-size:13px;font-weight:600}
.ct{padding:18px;flex:1}
.pg{display:none}.pg.ac{display:block}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.pt{font-size:18px;font-weight:600}
.sg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:11px;margin-bottom:16px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:13px 15px}
.sl{font-size:11px;color:var(--mu);font-weight:500;margin-bottom:5px}
.sv{font-size:21px;font-weight:700}
.cd{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:13px}
.ch{padding:11px 15px;border-bottom:1px solid var(--bd);font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.cb{padding:13px 15px}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 11px;color:var(--mu);font-weight:500;border-bottom:1px solid var(--bd);background:#f8fafc;font-size:11px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
td{padding:9px 11px;border-bottom:1px solid #f1f5f9;color:var(--tx);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.bg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bp{background:#fffbeb;color:#92400e}.bc{background:#f0fdf4;color:#166534}
.be{background:#eff6ff;color:#1e40af}.bx{background:#fef2f2;color:#991b1b}
.br{background:#f0fdf4;color:#166534}.bpa{background:#eff6ff;color:#1e40af}
.bv{background:#fef2f2;color:#991b1b}.bpg{background:#f0fdf4;color:#166534}
.ben{background:#f0fdf4;color:#166534}.bsa{background:#fef2f2;color:#991b1b}
.bav{background:#fffbeb;color:#92400e}.baj{background:#eff6ff;color:#1e40af}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-weight:500;transition:all .15s;white-space:nowrap}
.btn:hover{background:#f1f5f9}
.btn-p{background:var(--p);color:#fff;border-color:var(--p)}.btn-p:hover{background:#0e4f8c}
.btn-s{background:var(--ok);color:#fff;border-color:var(--ok)}
.btn-d{background:var(--er);color:#fff;border-color:var(--er)}
.btn-w{background:var(--wa);color:#fff;border-color:var(--wa)}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-ic{padding:4px;width:27px;height:27px;justify-content:center}
.fg{margin-bottom:11px}
label{display:block;font-size:12px;font-weight:500;color:var(--mu);margin-bottom:4px}
input,select,textarea{width:100%;padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;background:var(--sf);color:var(--tx);outline:none;transition:border .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--p)}
textarea{resize:vertical;min-height:68px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.fr4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:9px}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.44);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px}
.md{background:var(--sf);border-radius:var(--rl);width:100%;max-width:620px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.md-lg{max-width:800px}
.mh{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--sf);z-index:1}
.mt{font-size:14px;font-weight:600}
.mbd{padding:18px}
.mf{padding:11px 18px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--sf)}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:14px;overflow-x:auto}
.tab{padding:7px 14px;font-size:13px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;white-space:nowrap;flex-shrink:0}
.tab.ac{color:var(--p);border-bottom-color:var(--p)}
.al{padding:9px 13px;border-radius:var(--r);font-size:13px;margin-bottom:11px;display:flex;align-items:center;gap:7px}
.al-d{background:#fef2f2;color:var(--er);border:1px solid #fecaca}
.al-s{background:#f0fdf4;color:var(--ok);border:1px solid #bbf7d0}
.al-w{background:#fffbeb;color:var(--wa);border:1px solid #fde68a}
.al-i{background:var(--pl);color:var(--pt);border:1px solid #bfdbfe}
.eb{height:5px;border-radius:3px;background:#e2e8f0;overflow:hidden;margin-top:3px}
.ef{height:100%;border-radius:3px}
.ef-ok{background:var(--ok)}.ef-lo{background:var(--er)}.ef-hi{background:var(--wa)}
.pr-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.pr-row:last-child{border-bottom:none}
.pr-tot{font-weight:700;font-size:14px;color:var(--p);background:var(--pl);padding:9px 13px;border-radius:var(--r);margin-top:9px;display:flex;justify-content:space-between}
.ps{max-height:190px;overflow-y:auto;border:1px solid var(--bd);border-radius:var(--r);background:#f8fafc}
.po{padding:7px 11px;cursor:pointer;font-size:13px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;transition:background .12s}
.po:hover{background:var(--pl)}.po:last-child{border-bottom:none}
.it{width:100%;border-collapse:collapse;font-size:13px}
.it th{padding:6px 9px;text-align:left;background:#f8fafc;border-bottom:1px solid var(--bd);font-size:11px;color:var(--mu);text-transform:uppercase}
.it td{padding:6px 9px;border-bottom:1px solid #f1f5f9}
.sg-c{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--r);padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:11px;font-size:13px}
.twc{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:7px}
.twi{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:10px 15px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.1);display:flex;align-items:center;gap:7px;min-width:210px;animation:sli .2s ease}
.twi.success{border-left:3px solid var(--ok)}.twi.error{border-left:3px solid var(--er)}.twi.info{border-left:3px solid var(--p)}
@keyframes sli{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.ld{display:flex;align-items:center;justify-content:center;padding:44px;color:var(--mu);gap:9px}
.sp{width:19px;height:19px;border:2px solid var(--bd);border-top-color:var(--p);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.em{text-align:center;padding:38px;color:var(--mu);font-size:13px}
.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e6f1fb 0%,#f4f6f9 100%)}
.lc{background:var(--sf);border-radius:var(--rl);border:1px solid var(--bd);padding:34px;width:370px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.llm{width:50px;height:50px;border-radius:11px;background:var(--p);color:#fff;font-size:21px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 11px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
@media(max-width:768px){.sb{transform:translateX(-100%)}.mn{margin-left:0!important}.sg,.tc,.fr,.fr3,.fr4{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="root"></div>
<div class="twc" id="tw"></div>
<script>
const SURL='https://xtbzuqjnwxuczuprmcxn.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0Ynp1cWpud3h1Y3p1cHJtY3huIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNzY2MDYsImV4cCI6MjA4OTc1MjYwNn0.ULdNhc-kVP-9WRc119LIMEpRJPv6YTfwxCmVXHr7e5A';
const sb=supabase.createClient(SURL,SKEY);
let S={user:null,profile:null,isAdmin:false,permissions:[],config:{},col:false,page:'dashboard',data:{},authLoading:true,q:'',fs:'',ft:'',fc:'',sug:[]};
const fmt=v=>'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fd=d=>d?new Date(d.includes('T')?d:d+'T00:00').toLocaleDateString('pt-BR'):'-';
const td=()=>new Date().toISOString().split('T')[0];
const $ =id=>document.getElementById(id);
const gv=id=>{const e=$(id);return e?e.value:''};

function toast(m,t='success'){
  const el=document.createElement('div');
  el.className='twi '+t;
  el.innerHTML='<span style="font-weight:700">'+(t==='success'?'✓':t==='error'?'✕':'ℹ')+'</span><span>'+m+'</span>';
  $('tw').appendChild(el);setTimeout(()=>el.remove(),3500);
}
function bpd(s){const m={pendente:'bp',confirmado:'bc',entregue:'be',cancelado:'bx'};return'<span class="bg '+(m[s]||'bp')+'">'+( s||'pendente')+'</span>';}

// ═══ NAV ═══
const NAV=[
  {s:'Principal'},{k:'dashboard',l:'Dashboard'},{k:'pedidos',l:'Pedidos'},{k:'clientes',l:'Clientes'},
  {s:'Produtos & Estoque'},{k:'produtos',l:'Produtos'},{k:'estoque',l:'Estoque'},{k:'catalogo',l:'Catálogo'},
  {s:'Compras & Finanças'},{k:'financeiro',l:'Financeiro'},{k:'compras',l:'Compras'},{k:'fornecedores',l:'Fornecedores'},
  {s:'Admin'},{k:'configuracoes',l:'Configurações'},{k:'usuarios',l:'Usuários',adm:true},
];
const PAGES=['dashboard','pedidos','clientes','produtos','estoque','catalogo','financeiro','compras','fornecedores','configuracoes','usuarios'];
const TPERMS=[{k:'dashboard',l:'Dashboard'},{k:'pedidos',l:'Pedidos'},{k:'clientes',l:'Clientes'},{k:'produtos',l:'Produtos'},{k:'estoque',l:'Estoque'},{k:'catalogo',l:'Catálogo'},{k:'financeiro',l:'Financeiro'},{k:'compras',l:'Compras'},{k:'fornecedores',l:'Fornecedores'},{k:'configuracoes',l:'Configurações'}];
const NAVICONS={
  dashboard:'<svg viewBox="0 0 20 20" fill="currentColor"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5" opacity=".5"/><rect x="2" y="11" width="7" height="7" rx="1.5" opacity=".5"/><rect x="11" y="11" width="7" height="7" rx="1.5" opacity=".5"/></svg>',
  pedidos:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="2" width="12" height="16" rx="2"/><path d="M7 7h6M7 10h6M7 13h4"/></svg>',
  clientes:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="7" r="3"/><path d="M4 17c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>',
  produtos:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="11" y="3" width="6" height="6" rx="1"/><rect x="3" y="11" width="6" height="6" rx="1"/><rect x="11" y="11" width="6" height="6" rx="1"/></svg>',
  estoque:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="10" width="16" height="8" rx="1.5"/><rect x="5" y="6" width="10" height="5" rx="1"/><rect x="8" y="2" width="4" height="5" rx="1"/></svg>',
  catalogo:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="14" height="14" rx="2"/><path d="M7 7h6M7 10h6M7 13h4"/></svg>',
  financeiro:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/><path d="M10 6v1.5M10 12.5V14M8 9c0-1.1 1-2 2-2s2 .9 2 2-1 1.5-2 1.5S8 11.5 8 12.5s1 2 2 2 2-.9 2-2"/></svg>',
  compras:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 3h2l2.5 9h8L17 6H6"/><circle cx="9" cy="17" r="1.5" fill="currentColor"/><circle cx="15" cy="17" r="1.5" fill="currentColor"/></svg>',
  fornecedores:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="8" width="11" height="10" rx="1.5"/><path d="M13 11h3a1 1 0 011 1v2a1 1 0 01-1 1h-3M5 8V5a4 4 0 018 0v3"/></svg>',
  configuracoes:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="2.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4"/></svg>',
  usuarios:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="7" cy="7" r="3"/><path d="M2 17c0-3 2.2-5 5-5s5 2 5 5"/><circle cx="15" cy="8" r="2"/><path d="M13 17c0-2 .9-3.5 2-3.5s2 1.5 2 3.5"/></svg>',
};

// ═══ RENDER ROOT ═══
function render(){
  const r=$('root');
  if(S.authLoading){r.innerHTML='<div class="ld"><div class="sp"></div>Carregando...</div>';return;}
  if(!S.user){r.innerHTML=rLogin();bLogin();return;}
  r.innerHTML=rShell();bShell();rPage();
}

// ═══ LOGIN ═══
function rLogin(){
  return'<div class="lp"><div class="lc"><div class="llm">L</div><h2 style="text-align:center;font-size:19px;margin-bottom:3px">LuniExpress ERP</h2><p style="text-align:center;color:var(--mu);font-size:13px;margin-bottom:20px">Acesse sua conta</p><div id="lal"></div><div class="fg"><label>E-mail</label><input id="lem" type="email" placeholder="seu@email.com"/></div><div class="fg"><label>Senha</label><div style="position:relative"><input id="lpw" type="password" placeholder="••••••••" style="padding-right:36px"/><button onclick="var i=$(&apos;lpw&apos;);i.type=i.type===&apos;password&apos;?&apos;text&apos;:&apos;password&apos;" style="position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mu);cursor:pointer">👁</button></div><span id="lfgt" style="font-size:12px;color:var(--p);cursor:pointer;display:block;text-align:right;margin-top:3px">Esqueceu a senha?</span></div><button class="btn btn-p" style="width:100%;justify-content:center" id="lbtn">Entrar</button></div></div>';
}
function bLogin(){
  $('lbtn').onclick=async()=>{
    const e=gv('lem'),p=gv('lpw');
    if(!e||!p){$('lal').innerHTML='<div class="al al-w">Preencha e-mail e senha.</div>';return;}
    const btn=$('lbtn');btn.disabled=true;btn.textContent='Entrando...';
    const{error}=await sb.auth.signInWithPassword({email:e,password:p});
    if(error){$('lal').innerHTML='<div class="al al-d">E-mail ou senha incorretos.</div>';btn.disabled=false;btn.textContent='Entrar';}
  };
  $('lpw').onkeydown=ev=>{if(ev.key==='Enter')$('lbtn').click();};
  $('lfgt').onclick=async()=>{
    const e=gv('lem');
    if(!e){$('lal').innerHTML='<div class="al al-w">Digite seu e-mail.</div>';return;}
    await sb.auth.resetPasswordForEmail(e);
    $('lal').innerHTML='<div class="al al-s">E-mail de recuperação enviado!</div>';
  };
}

// ═══ SHELL ═══
function rShell(){
  const cfg=S.config;
  const vis=NAV.filter(n=>{if(n.s)return true;if(n.adm)return S.isAdmin;return S.isAdmin||S.permissions.includes(n.k);});
  return'<div class="app"><aside class="sb'+(S.col?' c':'')+'" id="sb"><div class="sb-br"><div class="bm">L</div><span class="bn">'+(cfg.nome_empresa||'LuniExpress')+'</span></div><nav class="nm">'+
  vis.map(n=>n.s?'<div class="ns">'+n.s+'</div>':'<div class="ni'+(S.page===n.k?' ac':'')+'" data-pg="'+n.k+'">'+(NAVICONS[n.k]||'')+'<span class="nl">'+n.l+'</span></div>').join('')+
  '<div style="margin-top:8px;border-top:1px solid var(--bd);padding-top:6px"><div class="ni" id="sobt"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" style="width:16px;height:16px"><path d="M13 15l4-5-4-5M17 10H7M7 3H4a1 1 0 00-1 1v12a1 1 0 001 1h3"/></svg><span class="nl">Sair</span></div></div></nav></aside>'+
  '<div class="mn'+(S.col?' c':'')+'" id="mn"><header class="hd"><div class="hc"'+(cfg.capa_url?' style="background-image:url('+cfg.capa_url+');background-size:cover;background-position:center"':'')+'>'+
  '<div class="hlw"><div class="hl">'+(cfg.logo_url?'<img src="'+cfg.logo_url+'" alt="logo"/>'+'<span>'+(cfg.nome_empresa||'L')[0]+'</span>')+'</div></div>'+

async function load(pg){

    pedidos:async()=>{
      const[ped,cli,pr,cfg]=await Promise.all([sb.from('pedidos').select('*,clientes(nome,cpf_cnpj,telefone,email,endereco,cidade,estado,cep)').order('data',{ascending:false}),sb.from('clientes').select('*'),sb.from('produtos').select('id,nome,preco_venda,codigo_sistema').eq('ativo',true),sb.from('configuracoes_empresa').select('*').single()]);

    },

    fornecedores:async()=>{const{data}=await sb.from('fornecedores').select('*').order('razao_social');S.data.forns=data||[];},

    financeiro:async()=>{const{data}=await sb.from('financeiro').select('*').order('data_vencimento',{ascending:true});S.data.fin=data||[];},
    configuracoes:async()=>{const{data}=await sb.from('configuracoes_empresa').select('*').single();if(data)S.config=data;},

window.calcP=function(){
  const v=id=>{const e=$(id);return e?parseFloat(e.value)||0:0;};
  const cu=v('mcu'),fr=v('mfr'),ic=v('mic'),ip=v('mip'),pi=v('mpi'),co=v('mco'),st=v('mst'),mg=v('mmg');
  const base=cu+fr;
  const vIc=base*ic/100,vIp=base*ip/100,vPi=base*pi/100,vCo=base*co/100,vSt=base*st/100;
  const tot=base+vIc+vIp+vPi+vCo+vSt,pv=tot*(1+mg/100);
  const el=$('pr');if(!el||cu===0){if(el)el.innerHTML='';return;}
  el.innerHTML='<div style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:11px">'+
  '<div style="font-size:11px;font-weight:600;color:var(--mu);margin-bottom:7px;text-transform:uppercase">Composição do preço</div>'+
  '<div class="pr-row"><span>Custo produto</span><span>'+fmt(cu)+'</span></div>'+
  (fr>0?'<div class="pr-row"><span>Frete</span><span>'+fmt(fr)+'</span></div>':'')+
  (ic>0?'<div class="pr-row"><span>ICMS '+ic+'%</span><span>'+fmt(vIc)+'</span></div>':'')+
  (ip>0?'<div class="pr-row"><span>IPI '+ip+'%</span><span>'+fmt(vIp)+'</span></div>':'')+
  (pi>0?'<div class="pr-row"><span>PIS '+pi+'%</span><span>'+fmt(vPi)+'</span></div>':'')+
  (co>0?'<div class="pr-row"><span>COFINS '+co+'%</span><span>'+fmt(vCo)+'</span></div>':'')+
  (st>0?'<div class="pr-row"><span>ICMS-ST '+st+'%</span><span>'+fmt(vSt)+'</span></div>':'')+
  '<div class="pr-row" style="font-weight:600"><span>Custo total</span><span>'+fmt(tot)+'</span></div>'+
  '<div class="pr-tot"><span>💰 Preço de venda calculado</span><span>'+fmt(pv)+'</span></div></div>';
};

window.savProd=async function(id){
  const nome=gv('mn').trim();if(!nome){toast('Nome obrigatório','error');return;}
  const nv=i=>{const e=$(i);return e?parseFloat(e.value)||0:0;};
  const cu=nv('mcu'),fr=nv('mfr'),ic=nv('mic'),ip=nv('mip'),pi=nv('mpi'),co=nv('mco'),st=nv('mst'),mg=nv('mmg');
  const base=cu+fr,tots=base*(ic+ip+pi+co+st)/100,pv=(base+tots)*(1+mg/100);
  const p={nome,custo:cu,frete:fr,icms:ic,ipi:ip,pis:pi,cofins:co,icms_st:st,margem:mg,preco_venda:pv,
    codigo_sistema:gv('mc')||null,codigo_barras:gv('mb')||null,ca:gv('mca')||null,
    categoria:gv('mcat')||null,fornecedor_id:gv('mforn')||null,ncm:gv('mncm')||null,
    cst:gv('mcst')||null,cfop:gv('mcfop')||null,origem:gv('mori')||null,
    descricao:gv('mde')||null,foto_url:gv('mfo')||null,ativo:gv('mat')==='true',
    estoque_atual:parseInt(gv('mea'))||0,estoque_min:parseInt(gv('men'))||null,
    estoque_max:parseInt(gv('mex'))||null,localizacao:gv('mlo')||null,unidade:gv('mun')||'UN'};
  if(id)await sb.from('produtos').update(p).eq('id',id);else await sb.from('produtos').insert(p);
  toast(id?'Atualizado!':'Criado!');mClose();await load('produtos');rProds();
};

    '<div class="cd"><div class="tw"><table><thead><tr><th>Produto</th><th>SKU</th><th>Categoria</th><th>Localização</th><th>Estoque atual</th><th>Mín</th><th>Máx</th><th>Status</th><th></th></tr></thead><tbody>'+

    (lo.length>0?'<div class="cd"><div class="ch" style="color:var(--er)">🚨 Abaixo do mínimo ('+lo.length+')</div><div class="tw"><table><thead><tr><th>Produto</th><th>Atual</th><th>Mínimo</th><th>Déficit</th><th>Ação</th></tr></thead><tbody>'+
    lo.map(p=>'<tr style="background:#fff8f8"><td><strong>'+p.nome+'</strong></td><td style="color:var(--er);font-weight:600">'+(p.estoque_atual||0)+'</td><td>'+p.estoque_min+'</td><td style="color:var(--er)">-'+(p.estoque_min-(p.estoque_atual||0))+'</td><td><button class="btn btn-sm btn-p" onclick="mMov(\'entrada\',\''+p.id+'\')">Repor</button></td></tr>').join('')+
    '</tbody></table></div></div>':'') +
    (hi.length>0?'<div class="cd"><div class="ch" style="color:var(--wa)">⚠ Acima do máximo ('+hi.length+')</div><div class="tw"><table><thead><tr><th>Produto</th><th>Atual</th><th>Máximo</th><th>Excesso</th></tr></thead><tbody>'+
    hi.map(p=>'<tr style="background:#fffbeb"><td><strong>'+p.nome+'</strong></td><td style="color:var(--wa);font-weight:600">'+(p.estoque_atual||0)+'</td><td>'+p.estoque_max+'</td><td style="color:var(--wa)">+'+(( p.estoque_atual||0)-p.estoque_max)+'</td></tr>').join('')+
    '</tbody></table></div></div>':'') +
    (lo.length===0&&hi.length===0?'<div class="em">✅ Nenhum alerta — estoque dentro dos limites!</div>':'');
  }
  else if(tab==='movimentacoes'){
    let list=movs;

    if(S.fs)list=list.filter(m=>m.tipo===S.fs);

    '<input style="max-width:210px;padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r)" placeholder="Buscar produto..." value="'+S.q+'" oninput="S.q=this.value;rEstTab(\'movimentacoes\')"/>'+
    '<select style="padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r)" onchange="S.fs=this.value;rEstTab(\'movimentacoes\')">'+
    '<option value="">Todos</option><option value="entrada"'+(S.fs==='entrada'?' selected':'')+'>Entrada</option>'+
    '<option value="saida"'+(S.fs==='saida'?' selected':'')+'>Saída</option>'+
    '<option value="avaria"'+(S.fs==='avaria'?' selected':'')+'>Avaria</option>'+
    '<option value="ajuste"'+(S.fs==='ajuste'?' selected':'')+'>Ajuste</option></select></div>'+
    '<div class="cd"><div class="tw"><table><thead><tr><th>Data</th><th>Produto</th><th>Tipo</th><th>Qtd</th><th>Motivo</th><th>Responsável</th></tr></thead><tbody>'+
    (list.length===0?'<tr><td colspan="6"><div class="em">Nenhuma movimentação</div></td></tr>':
    list.map(m=>'<tr><td style="font-size:12px;white-space:nowrap">'+fd(m.created_at)+'</td><td>'+(m.produtos?.nome||'-')+'</td>'+
    '<td><span class="bg '+(m.tipo==='entrada'?'ben':m.tipo==='saida'?'bsa':m.tipo==='avaria'?'bav':'baj')+'">'+m.tipo+'</span></td>'+
    '<td style="font-weight:600;'+(m.tipo==='saida'||m.tipo==='avaria'?'color:var(--er)':'color:var(--ok)')+'">'+(m.tipo==='saida'||m.tipo==='avaria'?'-':'+')+m.quantidade+'</td>'+
    '<td style="font-size:12px">'+(m.motivo||'-')+'</td><td style="font-size:12px">'+(m.responsavel||'-')+'</td></tr>').join(''))+'</tbody></table></div></div>';
  }
  else if(tab==='sugestoes'){
    const sugs=prods.filter(p=>p.estoque_min&&(p.estoque_atual||0)<p.estoque_min).map(p=>({...p,qtd:(p.estoque_max||p.estoque_min*2)-(p.estoque_atual||0)}));
    el.innerHTML='<div class="al al-i" style="margin-bottom:13px">🧠 Sugestões automáticas baseadas no estoque mínimo e máximo cadastrados.</div>'+
    (sugs.length===0?'<div class="em">✅ Nenhuma sugestão — estoque dentro dos limites.</div>':
    '<div style="display:flex;justify-content:flex-end;margin-bottom:11px">'+
    '<button class="btn btn-p" onclick="S.sug='+JSON.stringify(sugs)+';go(\'compras\')">📋 Gerar pedido automático</button></div>'+
    sugs.map(p=>'<div class="sg-c"><div><div style="font-weight:600">'+p.nome+'</div>'+
    '<div style="font-size:12px;color:var(--mu)">Atual: <strong style="color:var(--er)">'+(p.estoque_atual||0)+'</strong> | Mín: '+p.estoque_min+' | Máx: '+(p.estoque_max||'N/A')+'</div></div>'+

function mMov(tipo,prodId=''){
  const prods=S.data.prods||[];
  const MOTIVOS={entrada:['Compra de fornecedor','Devolução de cliente','Ajuste manual','Transferência'],saida:['Venda','Ajuste manual','Consumo interno','Transferência'],avaria:['Quebra','Vencimento','Extravio','Dano transporte','Outro'],ajuste:['Inventário','Correção sistema','Outro']};
  mOpen('<div class="md"><div class="mh"><span class="mt">'+(tipo==='entrada'?'📦 Entrada':tipo==='saida'?'📤 Saída':tipo==='avaria'?'⚠ Avaria':'🔧 Ajuste')+'</span><button class="btn btn-sm" onclick="mClose()">✕</button></div>'+
  '<div class="mbd">'+
  '<div class="fg"><label>Produto *</label><input id="mpsr" placeholder="Buscar produto..." oninput="filtMP(this.value)"/>'+
  '<div class="ps" id="mplist" style="margin-top:6px">'+prods.map(p=>'<div class="po" data-id="'+p.id+'" data-nm="'+p.nome+'" data-est="'+(p.estoque_atual||0)+'"><span>'+p.nome+'</span><span style="font-size:11px;color:var(--mu)">Estoque: '+(p.estoque_atual||0)+'</span></div>').join('')+'</div>'+
  '<input id="mpid" type="hidden" value="'+prodId+'"/><div id="mpsel" style="font-size:13px;color:var(--p);font-weight:500;margin-top:6px"></div></div>'+
  '<div class="fr"><div class="fg"><label>Quantidade *</label><input id="mqtd" type="number" min="1" value="1"/></div>'+
  '<div class="fg"><label>Data</label><input id="mdat" type="date" value="'+td()+'"/></div></div>'+
  '<div class="fr"><div class="fg"><label>Motivo</label><select id="mmot">'+MOTIVOS[tipo].map(m=>'<option>'+m+'</option>').join('')+'</select></div>'+
  '<div class="fg"><label>Responsável</label><input id="mres" value="'+(S.profile?.nome||'')+'"/></div></div>'+
  '<div class="fg"><label>Observações</label><textarea id="mobs"></textarea></div>'+
  '</div><div class="mf"><button class="btn" onclick="mClose()">Cancelar</button><button class="btn btn-p" onclick="savMov(\''+tipo+'\')">Registrar</button></div></div>');

  if(prodId){const p=prods.find(x=>x.id===prodId);if(p){$('mpid').value=p.id;$('mpsel').textContent='✓ '+p.nome;}}

  window.filtMP=q=>{
    const list=q?prods.filter(p=>p.nome?.toLowerCase().includes(q.toLowerCase())):prods;
    const el=$('mplist');
    if(el){el.innerHTML=list.map(p=>'<div class="po" data-id="'+p.id+'" data-nm="'+p.nome+'" data-est="'+(p.estoque_atual||0)+'"><span>'+p.nome+'</span><span style="font-size:11px;color:var(--mu)">Estoque: '+(p.estoque_atual||0)+'</span></div>').join('');bindMPList();}
  };
  function bindMPList(){
    document.querySelectorAll('#mplist .po').forEach(el=>{
      el.onclick=()=>{$('mpid').value=el.dataset.id;$('mpsel').textContent='✓ '+el.dataset.nm+' (atual: '+el.dataset.est+')';document.querySelectorAll('#mplist .po').forEach(x=>x.style.background='');el.style.background='var(--pl)';};
    });
  }
  bindMPList();
}

window.savMov=async function(tipo){
  const pid=$('mpid').value,qtd=parseInt($('mqtd').value)||0;
  if(!pid){toast('Selecione um produto','error');return;}
  if(qtd<=0){toast('Quantidade inválida','error');return;}
  const{error}=await sb.from('movimentacoes_estoque').insert({produto_id:pid,tipo,quantidade:qtd,motivo:gv('mmot'),responsavel:gv('mres'),observacoes:gv('mobs'),user_id:S.user.id}).catch(e=>({error:e}));
  if(error){
    if(error.code==='42P01'||error.message?.includes('does not exist')){
      toast('Crie a tabela "movimentacoes_estoque" no Supabase para usar este recurso.','error');
    }else toast('Erro: '+(error.message||error),'error');
    return;
  }
  const p=S.data.prods?.find(x=>x.id===pid);
  if(p){const ne=(tipo==='entrada')?(p.estoque_atual||0)+qtd:Math.max(0,(p.estoque_atual||0)-qtd);await sb.from('produtos').update({estoque_atual:ne}).eq('id',pid);}
  toast('Movimentação registrada!');mClose();await load('estoque');rEst();
};

function mAjuste(pid,nome){
  mOpen('<div class="md"><div class="mh"><span class="mt">Ajuste de estoque — '+nome+'</span><button class="btn btn-sm" onclick="mClose()">✕</button></div>'+
  '<div class="mbd"><div class="fg"><label>Novo estoque (quantidade real contada)</label><input id="mnej" type="number" min="0"/></div>'+
  '<div class="fg"><label>Motivo</label><input id="mmaj" value="Inventário"/></div></div>'+
  '<div class="mf"><button class="btn" onclick="mClose()">Cancelar</button><button class="btn btn-p" onclick="savAj(\''+pid+'\')">Confirmar</button></div></div>');
}
window.savAj=async function(pid){
  const ne=parseInt(gv('mnej'));if(isNaN(ne)||ne<0){toast('Informe quantidade válida','error');return;}
  const p=S.data.prods?.find(x=>x.id===pid);
  const diff=ne-(p?.estoque_atual||0);
  await sb.from('produtos').update({estoque_atual:ne}).eq('id',pid);
  await sb.from('movimentacoes_estoque').insert({produto_id:pid,tipo:'ajuste',quantidade:Math.abs(diff),motivo:gv('mmaj'),responsavel:S.profile?.nome||'',user_id:S.user.id}).catch(()=>{});
  toast('Estoque ajustado!');mClose();await load('estoque');rEst();
};

function mPed(){
  const clis=S.data.clis||[];const prods=S.data.pa||[];let itens=[];let sq='';
  function hItens(){
    if(!itens.length)return'<div style="text-align:center;padding:13px;color:var(--mu);font-size:13px">Nenhum produto adicionado</div>';
    const sub=itens.reduce((s,i)=>s+i.subtotal,0);
    return'<table class="it"><thead><tr><th>Produto</th><th>Qtd</th><th>Preço</th><th>Subtotal</th><th></th></tr></thead><tbody>'+
    itens.map((it,idx)=>'<tr><td>'+it.nome+'</td>'+
    '<td><input type="number" min="1" value="'+it.quantidade+'" style="width:58px;padding:3px 6px;font-size:12px" onchange="updItem('+idx+',this.value)"/></td>'+
    '<td>'+fmt(it.preco_unitario)+'</td><td><strong>'+fmt(it.subtotal)+'</strong></td>'+
    '<td><button class="btn btn-sm btn-ic" onclick="rmItem('+idx+')">✕</button></td></tr>').join('')+
    '</tbody></table><div style="text-align:right;padding:7px 0;font-size:13px;color:var(--mu)">Subtotal: <strong>'+fmt(sub)+'</strong></div>';
  }
  function hProds(){
    const l=sq?prods.filter(p=>p.nome?.toLowerCase().includes(sq.toLowerCase())):prods;
    return l.map(p=>'<div class="po" data-id="'+p.id+'" data-nm="'+p.nome+'" data-pr="'+(p.preco_venda||0)+'"><span>'+p.nome+'</span><span style="font-size:12px;font-weight:600;color:var(--p)">'+fmt(p.preco_venda)+'</span></div>').join('');
  }
  function updTot(){
    const sub=itens.reduce((s,i)=>s+i.subtotal,0);
    const fr=parseFloat($('mfrp')?.value)||0;
    const tot=sub+fr;
    const te=$('mtot');if(te)te.textContent=fmt(tot);
    const parc=parseInt($('mprc')?.value)||1;
    const pe=$('mpar');if(pe)pe.textContent=parc>1?'('+parc+'x de '+fmt(tot/parc)+')':'';
  }
  mOpen('<div class="md md-lg"><div class="mh"><span class="mt">Novo Pedido</span><button class="btn btn-sm" onclick="mClose()">✕</button></div><div class="mbd">'+
  '<div class="fr"><div class="fg"><label>Cliente *</label><select id="mcli"><option value="">Selecione</option>'+clis.map(c=>'<option value="'+c.id+'">'+c.nome+'</option>').join('')+'</select></div>'+
  '<div class="fg"><label>Data</label><input id="mdat" type="date" value="'+td()+'"/></div></div>'+
  '<div class="fr"><div class="fg"><label>Forma de pagamento</label><select id="mfpg"><option>Dinheiro</option><option>Pix</option><option>Boleto</option><option>Cartão de crédito</option><option>Cartão de débito</option><option>Transferência</option></select></div>'+
  '<div class="fg"><label>Parcelas</label><input id="mprc" type="number" min="1" value="1" oninput="updTotPed()"/></div></div>'+
  '<div class="fr"><div class="fg"><label>Prazo entrega (dias)</label><input id="mpraz" type="number" min="0" value="0"/></div>'+

  '<div style="font-weight:600;font-size:13px;margin-bottom:9px">Produtos do pedido</div>'+
  '<input placeholder="Buscar produto..." style="margin-bottom:7px;padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r);width:100%" id="mpsr2" oninput="updProdList(this.value)"/>'+
  '<div class="ps" id="mplist2">'+hProds()+'</div>'+
  '<div id="mitens" style="margin-top:11px">'+hItens()+'</div></div>'+
  '<div style="background:var(--pl);border-radius:var(--r);padding:11px 15px;margin-top:9px;display:flex;align-items:center;justify-content:space-between">'+
  '<span style="font-weight:600;color:var(--pt)">Total do pedido</span>'+
  '<div style="text-align:right"><div style="font-size:19px;font-weight:700;color:var(--p)" id="mtot">'+fmt(0)+'</div>'+
  '<div style="font-size:12px;color:var(--pt)" id="mpar"></div></div></div>'+
  '</div><div class="mf"><button class="btn" onclick="mClose()">Cancelar</button><button class="btn btn-p" onclick="savPed()">Criar pedido</button></div></div>');

  window.rmItem=(idx)=>{itens.splice(idx,1);$('mitens').innerHTML=hItens();updTot();};
  window.updTotPed=updTot;
  window.updProdList=(q)=>{sq=q;$('mplist2').innerHTML=hProds();bPList();};
  function bPList(){document.querySelectorAll('#mplist2 .po').forEach(el=>{el.onclick=()=>{if(itens.find(i=>i.produto_id===el.dataset.id)){toast('Já adicionado','error');return;}itens.push({produto_id:el.dataset.id,nome:el.dataset.nm,quantidade:1,preco_unitario:parseFloat(el.dataset.pr)||0,subtotal:parseFloat(el.dataset.pr)||0});$('mitens').innerHTML=hItens();updTot();};});}
  bPList();

  window.savPed=async()=>{
    const cid=gv('mcli');if(!cid){toast('Selecione cliente','error');return;}

    const fr=parseFloat(gv('mfrp'))||0,sub=itens.reduce((s,i)=>s+i.subtotal,0),tot=sub+fr;
    const{data:ped,error}=await sb.from('pedidos').insert({cliente_id:cid,data:gv('mdat'),forma_pagamento:gv('mfpg'),parcelas:parseInt(gv('mprc'))||1,prazo:parseInt(gv('mpraz'))||0,valor_frete:fr,valor_total:tot,observacoes:gv('mobs')||null,status:'pendente'}).select().single();

    toast('Pedido criado!');mClose();await load('pedidos');rPeds();
  };
}

// PDF PEDIDO
async function pdfPed(pedId){
  const{jsPDF}=window.jspdf;
  const p=(S.data.peds||[]).find(x=>x.id===pedId);
  const{data:itens}=await sb.from('itens_pedido').select('*,produtos(nome,codigo_sistema)').eq('pedido_id',pedId);
  const cfg=S.config||{},cli=p?.clientes||{};
  const fr=p?.valor_frete||0,sub=(itens||[]).reduce((s,i)=>s+(i.subtotal||0),0),tot=sub+fr;
  const doc=new jsPDF(),pw=doc.internal.pageSize.getWidth(),ph=doc.internal.pageSize.getHeight();

  doc.setFillColor(24,95,165);doc.rect(0,0,pw,34,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(17);doc.setFont('helvetica','bold');
  doc.text(cfg.nome_empresa||'LuniExpress ERP',14,14);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text('RELATÓRIO DE PEDIDO',14,22);
  doc.text('Emitido: '+new Date().toLocaleDateString('pt-BR'),pw-14,22,{align:'right'});

  doc.setFillColor(230,241,251);doc.rect(0,34,pw,18,'F');
  doc.setTextColor(30,30,30);doc.setFontSize(9);
  doc.setFont('helvetica','bold');doc.text('STATUS:',14,42);doc.setFont('helvetica','normal');doc.text((p?.status||'').toUpperCase(),38,42);
  doc.setFont('helvetica','bold');doc.text('DATA:',80,42);doc.setFont('helvetica','normal');doc.text(fd(p?.data),96,42);
  doc.setFont('helvetica','bold');doc.text('PAGAMENTO:',130,42);doc.setFont('helvetica','normal');doc.text((p?.forma_pagamento||'-')+(p?.parcelas>1?' ('+p.parcelas+'x)':''),163,42);
  doc.setFont('helvetica','bold');doc.text('PRAZO:',14,50);doc.setFont('helvetica','normal');doc.text(p?.prazo?p.prazo+' dias':'Imediato',38,50);

  let y=62;
  doc.setFont('helvetica','bold');doc.setTextColor(24,95,165);doc.setFontSize(9);doc.text('EMPRESA',14,y);y+=5;
  doc.setTextColor(30,30,30);doc.setFont('helvetica','normal');
  doc.text(cfg.nome_empresa||'LuniExpress ERP',14,y);y+=4;
  if(cfg.cnpj)doc.text('CNPJ: '+cfg.cnpj,14,y),y+=4;
  if(cfg.endereco)doc.text(cfg.endereco,14,y),y+=4;
  if(cfg.telefone)doc.text('Tel: '+cfg.telefone,14,y),y+=4;

  y=62;
  doc.setFont('helvetica','bold');doc.setTextColor(24,95,165);doc.text('COMPRADOR',110,y);y+=5;
  doc.setTextColor(30,30,30);doc.setFont('helvetica','normal');
  doc.text(cli.nome||'-',110,y);y+=4;
  if(cli.cpf_cnpj)doc.text('CPF/CNPJ: '+cli.cpf_cnpj,110,y),y+=4;
  if(cli.telefone)doc.text('Tel: '+cli.telefone,110,y),y+=4;
  if(cli.email)doc.text(cli.email,110,y),y+=4;
  if(cli.endereco)doc.text(cli.endereco,110,y),y+=4;
  if(cli.cidade)doc.text(cli.cidade+(cli.estado?'/'+cli.estado:'')+(cli.cep?' CEP:'+cli.cep:''),110,y),y+=4;

  y=Math.max(y,100)+6;
  doc.setFont('helvetica','bold');doc.setTextColor(24,95,165);doc.text('ITENS DO PEDIDO',14,y);y+=3;
  doc.autoTable({startY:y,head:[['Código','Produto','Qtd','Preço Unit.','Subtotal']],
    body:(itens||[]).map(i=>[i.produtos?.codigo_sistema||'-',i.produtos?.nome||'-',i.quantidade,fmt(i.preco_unitario),fmt(i.subtotal)]),
    styles:{fontSize:9,cellPadding:4},headStyles:{fillColor:[24,95,165],textColor:255,fontStyle:'bold'},
    alternateRowStyles:{fillColor:[240,246,255]},columnStyles:{0:{cellWidth:25},2:{halign:'center'},3:{halign:'right'},4:{halign:'right'}}});

  const fy=doc.lastAutoTable.finalY+8;
  doc.setFillColor(240,246,255);doc.rect(pw-92,fy-5,78,fr>0?32:24,'F');
  doc.setFont('helvetica','normal');doc.setTextColor(30,30,30);doc.setFontSize(9);
  doc.text('Subtotal:',pw-88,fy+2);doc.text(fmt(sub),pw-14,fy+2,{align:'right'});
  if(fr>0){doc.text('Frete:',pw-88,fy+8);doc.text(fmt(fr),pw-14,fy+8,{align:'right'});}
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(24,95,165);
  const ty=fy+(fr>0?18:11);
  doc.text('TOTAL:',pw-88,ty);doc.text(fmt(tot),pw-14,ty,{align:'right'});
  if(p?.parcelas>1){doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(100,100,100);doc.text(p.parcelas+'x de '+fmt(tot/p.parcelas),pw-14,ty+6,{align:'right'});}

  if(p?.parcelas>1&&p?.prazo>0){
    const py=doc.lastAutoTable.finalY+55;
    doc.setFont('helvetica','bold');doc.setTextColor(24,95,165);doc.setFontSize(9);doc.text('DATAS DE PAGAMENTO',14,py);
    const vp=tot/p.parcelas,rows=[];
    for(let i=1;i<=p.parcelas;i++){const dt=new Date();dt.setDate(dt.getDate()+p.prazo*i);rows.push([i+'ª parcela',dt.toLocaleDateString('pt-BR'),fmt(vp)]);}
    doc.autoTable({startY:py+3,head:[['Parcela','Vencimento','Valor']],body:rows,styles:{fontSize:9},headStyles:{fillColor:[24,95,165],textColor:255},columnStyles:{2:{halign:'right'}}});
  }
  if(p?.observacoes){const oy=(doc.lastAutoTable?.finalY||fy+42)+10;doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);doc.setFontSize(9);doc.text('Observações:',14,oy);doc.setFont('helvetica','normal');doc.text(p.observacoes,14,oy+5,{maxWidth:pw-28});}
  doc.setFillColor(24,95,165);doc.rect(0,ph-10,pw,10,'F');doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text((cfg.nome_empresa||'LuniExpress ERP')+' — '+new Date().toLocaleDateString('pt-BR'),pw/2,ph-4,{align:'center'});
  doc.save('pedido-'+(cli.nome?.replace(/\s/g,'-')||'pedido')+'-'+fd(p?.data).replace(/\//g,'-')+'.pdf');
  toast('PDF gerado!');
}

function mComp(){
  const forns=S.data.forns||[];const prods=S.data.prods||[];let itens=[];
  function hItens(){
    if(!itens.length)return'<div style="text-align:center;padding:11px;color:var(--mu);font-size:13px">Nenhum produto</div>';
    return'<table class="it"><thead><tr><th>Produto</th><th>Qtd</th><th>IPI%</th><th>ICMS%</th><th>Total c/impostos</th><th></th></tr></thead><tbody>'+
    itens.map((it,idx)=>'<tr><td>'+it.nome+'</td>'+
    '<td><input type="number" min="1" value="'+it.quantidade+'" style="width:55px;padding:3px 6px;font-size:12px" onchange="updComp('+idx+',\'q\',this.value)"/></td>'+
    '<td><input type="number" step="0.01" value="'+it.ipi+'" style="width:55px;padding:3px 6px;font-size:12px" onchange="updComp('+idx+',\'i\',this.value)"/></td>'+
    '<td><input type="number" step="0.01" value="'+it.icms+'" style="width:55px;padding:3px 6px;font-size:12px" onchange="updComp('+idx+',\'c\',this.value)"/></td>'+
    '<td><strong>'+fmt(it.subtotal)+'</strong><div style="font-size:11px;color:var(--mu)">Imp: '+fmt(it.impostos)+'</div></td>'+
    '<td><button class="btn btn-sm btn-ic" onclick="rmComp('+idx+')">✕</button></td></tr>').join('')+
    '</tbody></table><div style="text-align:right;padding:6px;font-size:13px">Total: <strong>'+fmt(itens.reduce((s,i)=>s+i.subtotal,0))+'</strong></div>';
  }
  function calcIt(it){const imp=it.custo*(it.ipi+it.icms+it.pis+it.cofins)/100;it.impostos=imp*it.quantidade;it.subtotal=(it.custo+imp)*it.quantidade;}

  mOpen('<div class="md md-lg"><div class="mh"><span class="mt">Nova Compra</span><button class="btn btn-sm" onclick="mClose()">✕</button></div><div class="mbd">'+
  '<div class="fr"><div class="fg"><label>Fornecedor *</label><select id="mforn2"><option value="">Selecione</option>'+forns.map(f=>'<option value="'+f.id+'">'+f.razao_social+'</option>').join('')+'</select></div>'+
  '<div class="fg"><label>Status</label><select id="mst2"><option value="pendente">Pendente</option><option value="recebido">Recebido</option><option value="cancelado">Cancelado</option></select></div></div>'+
  '<div class="fg"><label>Buscar produto</label><input placeholder="Digite para filtrar..." oninput="filtComp(this.value)"/>'+
  '<div class="ps" id="cplist" style="margin-top:6px">'+prods.map(p=>'<div class="po" data-id="'+p.id+'" data-nm="'+p.nome+'" data-cu="'+(p.custo||0)+'" data-ipi="'+(p.ipi||0)+'" data-icms="'+(p.icms||0)+'" data-pis="'+(p.pis||0)+'" data-co="'+(p.cofins||0)+'"><span>'+p.nome+'</span><span class="bg bc">IPI:'+( p.ipi||0)+'% ICMS:'+(p.icms||0)+'%</span></div>').join('')+'</div></div>'+
  '<div id="citens">'+hItens()+'</div>'+
  '</div><div class="mf"><button class="btn" onclick="mClose()">Cancelar</button><button class="btn btn-p" onclick="savComp()">Salvar</button></div></div>');

  window.filtComp=q=>{const l=q?prods.filter(p=>p.nome?.toLowerCase().includes(q.toLowerCase())):prods;const el=$('cplist');if(el){el.innerHTML=l.map(p=>'<div class="po" data-id="'+p.id+'" data-nm="'+p.nome+'" data-cu="'+(p.custo||0)+'" data-ipi="'+(p.ipi||0)+'" data-icms="'+(p.icms||0)+'" data-pis="'+(p.pis||0)+'" data-co="'+(p.cofins||0)+'"><span>'+p.nome+'</span><span class="bg bc">IPI:'+( p.ipi||0)+'% ICMS:'+(p.icms||0)+'%</span></div>').join('');bCPList();}};
  window.updComp=(idx,f,v)=>{if(f==='q')itens[idx].quantidade=parseInt(v)||1;if(f==='i')itens[idx].ipi=parseFloat(v)||0;if(f==='c')itens[idx].icms=parseFloat(v)||0;calcIt(itens[idx]);$('citens').innerHTML=hItens();};
  window.rmComp=idx=>{itens.splice(idx,1);$('citens').innerHTML=hItens();};

  function bCPList(){document.querySelectorAll('#cplist .po').forEach(el=>{el.onclick=()=>{if(itens.find(i=>i.produto_id===el.dataset.id)){toast('Já adicionado','error');return;}const it={produto_id:el.dataset.id,nome:el.dataset.nm,quantidade:1,custo:parseFloat(el.dataset.cu)||0,ipi:parseFloat(el.dataset.ipi)||0,icms:parseFloat(el.dataset.icms)||0,pis:parseFloat(el.dataset.pis)||0,cofins:parseFloat(el.dataset.co)||0,subtotal:0,impostos:0};calcIt(it);itens.push(it);$('citens').innerHTML=hItens();};});}
  bCPList();

  window.savComp=async()=>{
    const fid=gv('mforn2');if(!fid){toast('Selecione fornecedor','error');return;}
    if(!itens.length){toast('Adicione produtos','error');return;}
    const timp=itens.reduce((s,i)=>s+i.impostos,0),ttot=itens.reduce((s,i)=>s+i.subtotal,0);
    const{data:comp,error}=await sb.from('compras').insert({fornecedor_id:fid,status:gv('mst2'),valor_total:ttot,valor_impostos:timp,data:td()}).select().single();
    if(error){toast('Erro: '+error.message,'error');return;}
    await sb.from('itens_compra').insert(itens.map(i=>({compra_id:comp.id,produto_id:i.produto_id,quantidade:i.quantidade,custo_unitario:i.custo})));
    toast('Compra registrada!');mClose();await load('compras');rComps();
  };
}

async function pdfComp(cid){
  const{jsPDF}=window.jspdf;
  const c=(S.data.comps||[]).find(x=>x.id===cid);
  const{data:itens}=await sb.from('itens_compra').select('*,produtos(nome,codigo_sistema,ipi,icms,pis,cofins)').eq('compra_id',cid);
  const cfg=S.config||{};
  const doc=new jsPDF(),pw=doc.internal.pageSize.getWidth(),ph=doc.internal.pageSize.getHeight();
  doc.setFillColor(24,95,165);doc.rect(0,0,pw,28,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(15);doc.setFont('helvetica','bold');doc.text('RELATÓRIO DE COMPRA',pw/2,12,{align:'center'});
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text(cfg.nome_empresa||'LuniExpress ERP',pw/2,20,{align:'center'});
  let y=36;doc.setTextColor(30,30,30);doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text('Fornecedor: '+(c?.fornecedores?.razao_social||'-'),14,y);y+=5;
  doc.text('Data: '+fd(c?.data)+' | Status: '+(c?.status||'-'),14,y);y+=8;
  doc.autoTable({startY:y,head:[['Código','Produto','Qtd','IPI%','ICMS%','Impostos','Total']],
    body:(itens||[]).map(i=>{const imp=(i.custo_unitario||0)*((i.produtos?.ipi||0)+(i.produtos?.icms||0)+(i.produtos?.pis||0)+(i.produtos?.cofins||0))/100,tot=((i.custo_unitario||0)+imp)*i.quantidade;return[i.produtos?.codigo_sistema||'-',i.produtos?.nome||'-',i.quantidade,(i.produtos?.ipi||0)+'%',(i.produtos?.icms||0)+'%',fmt(imp*i.quantidade),fmt(tot)];}),
    styles:{fontSize:9},headStyles:{fillColor:[24,95,165],textColor:255},columnStyles:{3:{halign:'center'},4:{halign:'center'},5:{halign:'right'},6:{halign:'right'}}});
  const fy=doc.lastAutoTable.finalY+8;
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(24,95,165);
  doc.text('Total impostos: '+fmt(c?.valor_impostos||0),pw-14,fy,{align:'right'});
  doc.text('TOTAL GERAL: '+fmt(c?.valor_total||0),pw-14,fy+7,{align:'right'});
  doc.setFillColor(24,95,165);doc.rect(0,ph-10,pw,10,'F');doc.setTextColor(255,255,255);doc.setFontSize(8);
  doc.text((cfg.nome_empresa||'LuniExpress')+' — '+new Date().toLocaleDateString('pt-BR'),pw/2,ph-4,{align:'center'});
  doc.save('compra-'+(c?.fornecedores?.razao_social?.replace(/\s/g,'-')||'compra')+'.pdf');toast('PDF gerado!');
}

  '<button class="btn btn-p" id="scfg">Salvar configurações</button></div></div></div>';
  $('scfg').onclick=async()=>{
    const p={nome_empresa:gv('cn'),cnpj:gv('ccnpj')||null,telefone:gv('ctel')||null,email:gv('cem')||null,endereco:gv('cend')||null,logo_url:gv('clog')||null,capa_url:gv('ccap')||null,cor_primaria:gv('ccor')};
    if(cfg.id)await sb.from('configuracoes_empresa').update(p).eq('id',cfg.id);else await sb.from('configuracoes_empresa').insert(p);
    Object.assign(S.config,p);toast('Configurações salvas!');
  };
}

// ═══════════════════════════════════════
// USUÁRIOS
// ═══════════════════════════════════════
function rUsers(){
  const el=$('pg-usuarios');const profs=S.data.profs||[];const roles=S.data.roles||[];const perms=S.data.perms||[];
  el.innerHTML='<div class="ph"><h2 class="pt">Gestão de Usuários</h2><button class="btn btn-p" id="nub">+ Novo usuário</button></div>'+
  '<div class="cd"><div class="tw">'+
  (profs.length===0?'<div class="em">Nenhum usuário</div>':
  '<table><thead><tr><th>Nome</th><th>Login</th><th>Perfil</th><th>Status</th><th>Permissões</th><th>Ações</th></tr></thead><tbody>'+
  profs.map(p=>{const role=roles.find(r=>r.user_id===p.id);const perm=perms.filter(r=>r.user_id===p.id).map(r=>r.tab_key);const adm=role?.role==='admin';
  return'<tr><td><strong>'+p.nome+'</strong></td><td style="font-size:12px">'+p.login+'</td>'+
  '<td><span class="bg '+(adm?'bc':'bp')+'">'+(role?.role||'user')+'</span></td>'+
  '<td><span class="bg '+(p.ativo?'bc':'bx')+'">'+(p.ativo?'Ativo':'Inativo')+'</span></td>'+
  '<td style="font-size:11px;color:var(--mu)">'+(adm?'Todas (admin)':perm.join(', ')||'-')+'</td>'+
  '<td><div style="display:flex;gap:3px">'+
  '<button class="btn btn-sm" data-eu="'+p.id+'">✏️</button>'+
  '<button class="btn btn-sm" data-su="'+p.id+'" data-em="'+(p.email||p.login)+'">🔑</button>'+
  '<button class="btn btn-sm '+(p.ativo?'btn-d':'btn-s')+'" data-tu="'+p.id+'" data-av="'+p.ativo+'">'+(p.ativo?'Desativar':'Ativar')+'</button>'+
  '</div></td></tr>';}).join('')+'</tbody></table>')+'</div></div>';
  $('nub').onclick=mNovoUser;
  document.querySelectorAll('[data-eu]').forEach(b=>{b.onclick=()=>{const p=S.data.profs.find(x=>x.id===b.dataset.eu);const role=S.data.roles.find(r=>r.user_id===b.dataset.eu);const perm=S.data.perms.filter(r=>r.user_id===b.dataset.eu).map(r=>r.tab_key);mEditUser(p,role?.role||'user',perm);};});
  document.querySelectorAll('[data-su]').forEach(b=>b.onclick=()=>mSenhaUser(b.dataset.em));
  document.querySelectorAll('[data-tu]').forEach(b=>b.onclick=async()=>{const av=b.dataset.av==='true';if(!confirm((av?'Desativar':'Ativar')+' usuário?'))return;await sb.from('profiles').update({ativo:!av}).eq('id',b.dataset.tu);toast('Usuário '+(av?'desativado':'ativado')+'!');await load('usuarios');rUsers();});
}

function mNovoUser(){
  mOpen('<div class="md"><div class="mh"><span class="mt">Novo Usuário</span><button class="btn btn-sm" onclick="mClose()">✕</button></div><div class="mbd">'+
  '<div class="fr"><div class="fg"><label>Nome *</label><input id="unm"/></div><div class="fg"><label>E-mail *</label><input id="uem" type="email"/></div></div>'+
  '<div class="fr"><div class="fg"><label>Senha * (mín. 6)</label><input id="upw" type="password"/></div>'+
  '<div class="fg"><label>Perfil</label><select id="urol" onchange="$(\'uperms\').style.display=this.value===\'admin\'?\'none\':\'block\'">'+
  '<option value="user">Operador</option><option value="admin">Administrador</option></select></div></div>'+
  '<div id="uperms"><div style="font-size:12px;font-weight:500;color:var(--mu);margin-bottom:7px">Permissões de acesso</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">'+
  TPERMS.map(t=>'<label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" class="pch" value="'+t.k+'" checked/>'+t.l+'</label>').join('')+'</div></div>'+
  '</div><div class="mf"><button class="btn" onclick="mClose()">Cancelar</button><button class="btn btn-p" onclick="savNovoUser()">Criar</button></div></div>');
  window.savNovoUser=async()=>{
    const n=gv('unm').trim(),e=gv('uem').trim(),pw=gv('upw'),r=gv('urol');
    if(!n||!e||!pw){toast('Preencha todos os campos','error');return;}
    if(pw.length<6){toast('Senha mínimo 6 caracteres','error');return;}
    const{data:au,error:ae}=await sb.auth.signUp({email:e,password:pw});
    if(ae){toast('Erro: '+ae.message,'error');return;}
    const uid=au.user?.id;if(!uid){toast('Erro ao criar usuário','error');return;}
    await sb.from('profiles').upsert({id:uid,nome:n,email:e,login:e,ativo:true});
    await sb.from('user_roles').upsert({user_id:uid,role:r});
    if(r==='user'){const cks=[...document.querySelectorAll('.pch:checked')].map(c=>c.value);if(cks.length)await sb.from('user_tab_permissions').upsert(cks.map(k=>({user_id:uid,tab_key:k})));}
    toast('Usuário criado!','info');mClose();await load('usuarios');rUsers();
  };
}
function mEditUser(p,cr,cp){
  mOpen('<div class="md"><div class="mh"><span class="mt">Editar — '+p.nome+'</span><button class="btn btn-sm" onclick="mClose()">✕</button></div><div class="mbd">'+
  '<div class="fr"><div class="fg"><label>Nome</label><input id="unm" value="'+p.nome+'"/></div>'+
  '<div class="fg"><label>Perfil</label><select id="urol" onchange="$(\'uperms\').style.display=this.value===\'admin\'?\'none\':\'block\'">'+
  '<option value="user"'+(cr==='user'?' selected':'')+'>Operador</option><option value="admin"'+(cr==='admin'?' selected':'')+'>Administrador</option></select></div></div>'+
  '<div id="uperms"'+(cr==='admin'?' style="display:none"':'')+'>'+
  '<div style="font-size:12px;font-weight:500;color:var(--mu);margin-bottom:7px">Permissões</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">'+
  TPERMS.map(t=>'<label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" class="pch" value="'+t.k+'"'+(cp.includes(t.k)?' checked':'')+'/> '+t.l+'</label>').join('')+'</div></div>'+
  '</div><div class="mf"><button class="btn" onclick="mClose()">Cancelar</button><button class="btn btn-p" onclick="savEditUser(\''+p.id+'\')">Salvar</button></div></div>');
  window.savEditUser=async(uid)=>{
    const n=gv('unm').trim(),r=gv('urol');
    await sb.from('profiles').update({nome:n}).eq('id',uid);
    await sb.from('user_roles').upsert({user_id:uid,role:r});
    await sb.from('user_tab_permissions').delete().eq('user_id',uid);
    if(r==='user'){const cks=[...document.querySelectorAll('.pch:checked')].map(c=>c.value);if(cks.length)await sb.from('user_tab_permissions').insert(cks.map(k=>({user_id:uid,tab_key:k})));}
    toast('Atualizado!');mClose();await load('usuarios');rUsers();
  };
}
function mSenhaUser(email){
  mOpen('<div class="md"><div class="mh"><span class="mt">Redefinir senha</span><button class="btn btn-sm" onclick="mClose()">✕</button></div>'+
  '<div class="mbd"><div class="al al-i">Será enviado e-mail de redefinição para: <strong>'+email+'</strong></div></div>'+
  '<div class="mf"><button class="btn" onclick="mClose()">Cancelar</button><button class="btn btn-p" onclick="envReset(\''+email+'\')">Enviar e-mail</button></div></div>');
  window.envReset=async(e)=>{await sb.auth.resetPasswordForEmail(e);toast('E-mail enviado!');mClose();};
}

// ═══ MODAL UTILS ═══
function mOpen(html){mClose();const d=document.createElement('div');d.className='mb';d.id='mbd';d.innerHTML=html;document.body.appendChild(d);d.onclick=e=>{if(e.target===d)mClose();};}
function mClose(){const e=$('mbd');if(e)e.remove();}

// ═══ INIT ═══
async function init(){
  sb.auth.onAuthStateChange(async(ev,sess)=>{
    S.user=sess?.user||null;
    if(S.user){
      const[pr,ro,pe,cfg]=await Promise.all([sb.from('profiles').select('*').eq('id',S.user.id).single(),sb.from('user_roles').select('role').eq('user_id',S.user.id),sb.from('user_tab_permissions').select('tab_key').eq('user_id',S.user.id),sb.from('configuracoes_empresa').select('*').single()]);
      S.profile=pr.data;S.isAdmin=(ro.data||[]).some(r=>r.role==='admin');S.permissions=(pe.data||[]).map(p=>p.tab_key);if(cfg.data)S.config=cfg.data;
    }
    S.authLoading=false;render();
    if(S.user){await load('dashboard');rPage();}
  });
}
init();
</script>
</body>
</html>
